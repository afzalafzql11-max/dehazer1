<!DOCTYPE html>
<html>

<head>

<title>Blue Dehazer</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Blue Image Dehazer</h1>

<div id="auth">

<h2>Signup</h2>

<input id="su_user" placeholder="username">
<input id="su_pass" type="password" placeholder="password">

<button onclick="signup()">Signup</button>

<h2>Login</h2>

<input id="li_user" placeholder="username">
<input id="li_pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<h2>Upload Hazy Image</h2>

<input type="file" id="image">
<button onclick="upload()">Dehaze</button>

<br><br>

<img id="result">

<h2>Your History</h2>

<div id="history"></div>

</div>

<script src="script.js"></script>

</body>
</html>
